<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vehicle-Roadside Collaborative HD Map Updating Demo</title>

  <style>
    body {
      font-family: "Times New Roman", serif;
      margin: 24px;
      background: #ffffff;
      color: #222222;
      text-align: center;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: #555555;
      margin-bottom: 20px;
    }

    .video-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .video-card {
      width: 50%;
      max-width: 580px;
      box-sizing: border-box;
    }

    .video-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    video {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      border: 1px solid #dddddd;
      border-radius: 6px;
      background: #000000;
    }

    .caption {
      font-size: 14px;
      color: #555555;
      margin-top: 6px;
      line-height: 1.4;
    }

    @media screen and (max-width: 800px) {
      .video-row {
        flex-direction: column;
        align-items: center;
      }

      .video-card {
        width: 95%;
        max-width: 680px;
      }
    }
  </style>
</head>

<body>

  <h1>Vehicle-Roadside Collaborative HD Map Updating Demo</h1>

  <div class="subtitle">
    Side-by-side visualization of roadside observations under construction and clean conditions.
  </div>

  <div class="video-row">

    <div class="video-card">
      <div class="video-title">Roadside Construction View</div>
      <video autoplay muted loop playsinline controls>
        <source src="assets/roadside_con.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="caption">
        Roadside view with temporary construction-related changes.
      </div>
    </div>

    <div class="video-card">
      <div class="video-title">Roadside Clean View</div>
      <video autoplay muted loop playsinline controls>
        <source src="assets/roadside_clean.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="caption">
        Roadside view under clean road conditions.
      </div>
    </div>

  </div>

</body>
</html>
